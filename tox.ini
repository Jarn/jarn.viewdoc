# Tox (https://tox.readthedocs.io/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it,
# "pip install tox" and then run "tox" from this directory.

[tox]
envlist = py38, py39, py310, py311, py312, py313, py314
requires =
    virtualenv<20.22.0

[testenv]
package = wheel
wheel_build_env = .pkg
extras =
    testing
commands =
    pip --disable-pip-version-check list
    nose2 -t . -s tests {posargs}

[pytest]
testpaths = tests
